<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>QG申必小金库 - 登录</title>
    <!-- 引入Vue 和 axios -->
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://unpkg.com/axios/dist/axios.min.js"></script>
    <script src="request.js"></script>
</head>
<body>

<h1 id="title">QG申必小金库</h1>

<div id="app">
    <h2>用户登录</h2>

    <div>
        <label for="username">用户名</label>
        <input
                type="text"
                id="username"
                v-model="username"
                placeholder="请输入用户名"
                @keyup.enter="handleLogin"
        >
    </div>

    <div>
        <label for="password">密码</label>
        <input
                type="password"
                id="password"
                v-model="password"
                placeholder="请输入密码"
                @keyup.enter="handleLogin"
        >
    </div>

    <button @click="handleLogin">登 录</button>

    <p class="loginMessage">{{ loginMessage }}</p>
</div>

<script>
    const {createApp} = Vue;

    const app = createApp({
        data() {
            return {
                username: '', // 记录输入的用户名
                password: '', // 记录输入的密码
                loginMessage: '', // 记录登录信息
                loginSuccess: false // 记录是否登录成功
            }
        },
        methods: {
            // 处理登录的函数
            async handleLogin() {
                // 表单验证
                if (!this.username.trim()) {
                    this.showMessage('请输入用户名！', false);
                    return;
                }
                if (!this.password.trim()) {
                    this.showMessage('请输入密码！', false);
                    return;
                }

                // 创建对象
                const login = {
                    username: this.username,
                    password: this.password,
                }

                post("/login", login).then(res => {
                    this.showMessage('登录成功！正在跳转...', true);
                    // 保存用户信息
                    const username = res.data.username;
                    const userId = res.data.id;
                    const balance = res.data.balance;
                    sessionStorage.setItem('isLoggedIn', 'true');
                    sessionStorage.setItem('username', username);
                    sessionStorage.setItem('userId', userId);
                    sessionStorage.setItem('balance', balance);

                    // 1.5秒后跳转到操作页面
                    setTimeout(() => {
                        window.location.href = 'http://localhost:8081/pay_system_war_exploded/main.html';
                    }, 1500);
                }).catch(err => {
                    console.log(err);
                    if (err.response) {
                        // 服务器返回了信息
                        this.showMessage('登录失败！' + (err.response.data.msg || '请稍后重试'), false);
                    } else {
                        this.showMessage('服务器连接失败！', false);
                    }
                })
            },
            // 处理提示信息
            showMessage(msg, isSuccess) {
                this.loginMessage = msg;
                this.loginSuccess = isSuccess;
                // 自动清除消息
                if (!isSuccess) {
                    setTimeout(() => {
                        this.loginMessage = '';
                    }, 3000);
                }
            }
        }
    });

    app.mount("#app");
</script>

</body>
</html>
